# AICodeAgent 默认配置
# 优先级：环境变量 > config/local.yaml > config/default.yaml
# 修改本文件请同步更新文档

# =============================================================================
# 模型与 AI 配置
# =============================================================================
ai:
  # Claude 模型标识（留空表示不指定 --model，由 Claude Code 自行决定）
  # 仅当需要强制覆盖模型时才填写，如 "claude-sonnet-4-6"
  claude_model: ""
  # Codex CLI 命令前缀（留空则回退 claude --print）
  codex_cmd: ""
  # Codex 审查超时（秒）
  codex_timeout: 900

# =============================================================================
# 超时配置
# =============================================================================
timeouts:
  # 三方辩论总超时
  debate: 600
  # 单 Agent 调用超时
  agent_single: 300
  # 任务总生命周期超时
  task_total: 7200
  # 需求澄清等待超时（小时）
  clarification_hours: 48
  # Gradle 构建超时
  build: 900
  # Claude 编码调用超时
  claude_code: 1800

# =============================================================================
# 重试配置
# =============================================================================
retries:
  # Debate 阶段重试次数
  debate: 1
  # Consensus 生成重试次数
  consensus: 2
  # Codex 逻辑审查重试次数
  codex_review: 2
  # 需求验收审查重试次数
  acceptance_review: 2
  # Claude 编码调用重试次数
  claude_code: 2
  # 指数退避基础延迟（秒）
  base_delay: 3.0

# =============================================================================
# Figma 视觉资产
# =============================================================================
figma:
  # Figma Personal Access Token
  token: ""
  # 默认设计稿 file key
  file_key: ""
  # API 请求指数退避基础延迟（秒）
  retry_delay: 2.0
  # 图标哈希相似度阈值（0~1）
  hash_similarity: 0.95

# =============================================================================
# 通知（Telegram）
# =============================================================================
notifications:
  telegram:
    bot_token: ""
    chat_id: ""

# =============================================================================
# Web API 网关
# =============================================================================
gateway:
  # Web UI 端口
  web_port: 6789
  # API 认证密钥（留空则不校验）
  api_key: ""

# =============================================================================
# 日志
# =============================================================================
logging:
  level: "INFO"
  # 单文件最大字节数
  max_bytes: 10000000
  # 保留备份数
  backup_count: 5

# =============================================================================
# Code Review Graph（代码图谱）
# =============================================================================
crg:
  http_url: "http://127.0.0.1:5555"
  repo_root: ""  # 留空则自动检测
  auto_start: false

# =============================================================================
# 逃逸检测
# =============================================================================
escape:
  # 连续 N 次相同错误模式视为不可解
  unsolvable_repeat: 2
  # 文件数量超过阈值触发 L2 升级
  file_threshold: 10

# =============================================================================
# 请求分类路由
# =============================================================================
routing:
  # 启用请求分类（关闭则所有请求走 CODE_REQUEST 完整流水线）
  enabled: true
  # 分类器类型: "rule" | "llm" | "hybrid"
  classifier: "rule"
  # 置信度阈值，低于此值降级为 CODE_REQUEST
  confidence_threshold: 0.7
  # 各类型是否启用
  enable_explain: true
  enable_review_only: true
  enable_design_only: true

# =============================================================================
# 功能开关
# =============================================================================
features:
  # 跳过需求澄清阶段（调试用）
  skip_clarification: false
  # 启用 Architect Planning 架构规划阶段（默认开启）
  architect_planning_enabled: true
  # 架构规划适用的任务等级（逗号分隔）
  architect_planning_for_levels: "L1,L2"
  # 架构规划最大重试次数
  architect_planning_max_retry: 2
  # 启用 Self Review 自审查（构建通过后自查，默认开启）
  self_review_enabled: true
  # Self Review 自信度阈值（0-10，低于此值进入 CORRECTING）
  self_review_threshold: 7
  # Self Review 最大重试次数
  self_review_max_retry: 1
  # 启用 Architect Review 架构评审（默认关闭）
  architect_review_enabled: false
  # 架构评审适用的任务等级（逗号分隔）
  architect_for_levels: "L2"
  # 架构评审最大重试次数
  architect_max_retry: 1
  # 启用 Red Team 红队审查（默认仅 L2）
  red_team_enabled: true
  # 红队审查适用的任务等级（逗号分隔）
  red_team_for_levels: "L2"
  # Red Team 最大重试次数
  red_team_max_retry: 1
  # Correcting 阶段最大重试次数
  correcting_max_retry: 3
  # Correcting 转用户澄清阈值比例（0.0-1.0，达到 max_retry * ratio 时启动）
  correcting_escalate_ratio: 0.6
  # Correcting 连续停滞轮数（最高优先级问题未减少）触发转用户
  correcting_stall_rounds: 2

# =============================================================================
# 构建环境（通常通过环境变量注入）
# =============================================================================
build:
  android_home: ""
  java_home: ""
  auto_allow_bash: true
