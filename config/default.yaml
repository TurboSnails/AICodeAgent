# AICodeAgent 默认配置
# 优先级：环境变量 > config/local.yaml > config/default.yaml
# 修改本文件请同步更新文档

# =============================================================================
# 模型与 AI 配置
# =============================================================================
ai:
  # 调用方式（当前仅支持方案一：subprocess 调用本机 claude 命令行，无 HTTP/SDK）
  transport: subprocess_cli
  # Claude 模型标识（留空表示不指定 --model，由 Claude Code 自行决定）
  # 仅当需要强制覆盖模型时才填写，如 "claude-sonnet-4-6"
  claude_model: ""
  # 审查阶段是否尝试 OpenAI Codex CLI；false = 一律 claude --print（与编码相同）
  use_codex_cli: false
  # Codex CLI 命令前缀（仅 use_codex_cli=true 时有效）
  codex_cmd: ""
  # Codex 审查超时（秒）
  codex_timeout: 900
  # CLI 输出：json（推荐，解析 result 字段）| text
  claude_output_format: json
  # headless=true：只读/分类（Read,Glob,Grep，无 Edit/Bash）
  claude_headless_print: true
  claude_headless_permission_mode: dontAsk
  claude_headless_tools: "Read,Glob,Grep"
  claude_headless_max_turns: 5
  # headless=false：编码 Agent（acceptEdits + Edit，由 CLI 直接改文件）
  claude_agent_permission_mode: acceptEdits
  claude_agent_tools: "Read,Edit,Write,Glob,Grep"
  claude_disallowed_tools: "Bash"
  claude_max_turns: 15

git:
  # 创建 agent 分支前是否 git pull（无头环境建议 false，避免凭据弹窗）
  pull_on_branch_create: false

# =============================================================================
# 超时配置
# =============================================================================
timeouts:
  # Kimi / claude --print 默认超时（路由、问答、单 Agent 等未单独指定时）
  llm: 500
  # 三方辩论总超时
  debate: 1200
  # 单 Agent 调用超时（辩论子 Agent、consensus 等）
  agent_single: 500
  # 任务总生命周期超时
  task_total: 7200
  # 需求澄清等待超时（小时）
  clarification_hours: 48
  # Gradle 构建超时
  build: 900
  # Claude 编码阶段超时（整文件生成 + 12KB 上下文，Kimi 常 >500s）
  claude_code: 1200
  # L0 单文件小改：上下文瘦身，仍可能较慢
  claude_code_l0: 900

# =============================================================================
# 重试配置
# =============================================================================
retries:
  # Debate 阶段重试次数
  debate: 1
  # Consensus 生成重试次数
  consensus: 2
  # Codex 逻辑审查重试次数
  codex_review: 2
  # 需求验收审查重试次数
  acceptance_review: 2
  # Claude 编码调用重试次数（仅空输出/rate limit；超时不再重试）
  claude_code: 2
  # L0 编码不重试，避免 900s×N 假死
  claude_code_l0: 0
  # 指数退避基础延迟（秒）
  base_delay: 3.0

# =============================================================================
# Figma 视觉资产
# =============================================================================
figma:
  # Figma Personal Access Token
  token: ""
  # 默认设计稿 file key
  file_key: ""
  # API 请求指数退避基础延迟（秒）
  retry_delay: 2.0
  # 图标哈希相似度阈值（0~1）
  hash_similarity: 0.95

# =============================================================================
# 通知（Telegram）
# =============================================================================
notifications:
  telegram:
    bot_token: ""
    chat_id: ""

# =============================================================================
# Web API 网关
# =============================================================================
gateway:
  # Web UI 端口
  web_port: 6789
  # API 认证密钥（留空则不校验）
  api_key: ""

# =============================================================================
# 日志
# =============================================================================
logging:
  level: "INFO"
  # 单文件最大字节数
  max_bytes: 10000000
  # 保留备份数
  backup_count: 5

# =============================================================================
# Code Review Graph（代码图谱）
# =============================================================================
crg:
  http_url: "http://127.0.0.1:5555"
  repo_root: ""  # 留空则自动检测
  auto_start: false

# =============================================================================
# 逃逸检测
# =============================================================================
escape:
  # 连续 N 次相同错误模式视为不可解
  unsolvable_repeat: 2
  # 文件数量超过阈值触发 L2 升级
  file_threshold: 10

# =============================================================================
# TencentDB Agent Memory（需 standalone Gateway，见 README）
# =============================================================================
memory:
  tencentdb:
    # 总开关；Gateway 未启动时自动降级，不阻塞任务
    enabled: false
    gateway_url: "http://127.0.0.1:8420"
    timeout_sec: 5
    # 跨任务共享的 session_key（L0~L3 管道按此聚合）
    session_key: "aicodeagent/wm"
    recall: true
    capture: true
    max_capture_chars: 12000

# =============================================================================
# 请求分类路由
# =============================================================================
routing:
  # 启用请求分类（关闭则所有请求走 CODE_REQUEST 完整流水线）
  enabled: true
  # 分类器: rule=仅关键词 | llm/hybrid=AI 判定（失败回退 rule）
  classifier: "hybrid"
  # hybrid 下先走规则快路径（L0 / VIPPager 等），避免每次 planning 都调 LLM
  rules_first: true
  # LLM 分类超时（秒）；rules_first 未命中时才调用
  classification_timeout: 500
  # 置信度阈值，低于此值降级为 CODE_REQUEST
  confidence_threshold: 0.7
  # 各类型是否启用
  enable_explain: true
  enable_review_only: true
  enable_design_only: true

# =============================================================================
# 功能开关
# =============================================================================
features:
  # L0 VIPPager 渐变：false = 一律走 Claude Code 真实改码；true = 本地规则 patch（已弃用默认）
  l0_vippager_deterministic: false
  # L0 构建通过后跳过 self_review（避免 agent 分支上 AICodeAgent 脏文件导致假 FAIL 死循环）
  self_review_for_l0: false
  # 跳过需求澄清阶段（调试用）
  skip_clarification: false
  # 启用 Architect Planning 架构规划阶段（默认开启）
  architect_planning_enabled: true
  # 架构规划适用的任务等级（逗号分隔）
  architect_planning_for_levels: "L1,L2"
  # 架构规划最大重试次数
  architect_planning_max_retry: 2
  # 启用 Self Review 自审查（构建通过后自查，默认开启）
  self_review_enabled: true
  # Self Review 自信度阈值（0-10，低于此值进入 CORRECTING）
  self_review_threshold: 7
  # Self Review 最大重试次数
  self_review_max_retry: 1
  # 启用 Architect Review 架构评审（默认关闭）
  architect_review_enabled: false
  # 架构评审适用的任务等级（逗号分隔）
  architect_for_levels: "L2"
  # 架构评审最大重试次数
  architect_max_retry: 1
  # 启用 Red Team 红队审查（默认仅 L2）
  red_team_enabled: true
  # 红队审查适用的任务等级（逗号分隔）
  red_team_for_levels: "L2"
  # Red Team 最大重试次数
  red_team_max_retry: 1
  # Correcting 阶段最大重试次数
  correcting_max_retry: 3
  # Correcting 转用户澄清阈值比例（0.0-1.0，达到 max_retry * ratio 时启动）
  correcting_escalate_ratio: 0.6
  # Correcting 连续停滞轮数（最高优先级问题未减少）触发转用户
  correcting_stall_rounds: 2

# =============================================================================
# 构建环境（通常通过环境变量注入）
# =============================================================================
build:
  android_home: ""
  java_home: ""
  auto_allow_bash: true
  # Agent 编译验收：仅 app:assembleDebug（不跑 testDebugUnitTest / lintDebug）
  assemble_only: true
  # 兼容旧键；L0 与全局 assemble_only 任一为 true 即只编译
  l0_assemble_only: true
